name: Deploy to Kinsta

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          cat << 'SSHKEY' > ~/.ssh/deploy_key
          ${{ secrets.KINSTA_SSH_KEY }}
          SSHKEY
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.KINSTA_PORT }} ${{ secrets.KINSTA_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.KINSTA_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.KINSTA_USER }}@${{ secrets.KINSTA_HOST }} \
            "echo connected successfully"

      - name: Deploy via Rsync
        run: |
          rsync -avzr \
            --exclude='uploads/' \
            --exclude='.git' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.KINSTA_PORT }} -o StrictHostKeyChecking=no" \
            ./wp-content/ \
            ${{ secrets.KINSTA_USER }}@${{ secrets.KINSTA_HOST }}:/www/testmig_838/public/wp-content/
            