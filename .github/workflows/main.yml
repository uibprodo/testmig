name: Deploy to Kinsta

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KINSTA_SSH_KEY }}

      - name: Add Kinsta to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.KINSTA_PORT }} ${{ secrets.KINSTA_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Rsync
        run: |
          rsync -avzr \
            --exclude='uploads/' \
            --exclude='.git' \
            -e "ssh -p ${{ secrets.KINSTA_PORT }} -o StrictHostKeyChecking=no" \
            ./wp-content/ \
            ${{ secrets.KINSTA_USER }}@${{ secrets.KINSTA_HOST }}:/www/testmig_838/public/wp-content/
